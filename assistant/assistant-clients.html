<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء - المساعد | KeyaTech</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0f1e;
            color: #fff;
        }

        .tech-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1f35 0%, #0a0f1e 100%);
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(102, 126, 234, 0.2);
            padding: 25px;
            position: fixed;
            height: 100vh;
            right: 0;
            top: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo span {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: #8f9bb3;
            text-decoration: none;
            border-radius: 12px;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(102, 126, 234, 0.1);
            color: #fff;
        }

        .nav-link i {
            width: 24px;
            color: #667eea;
        }

        .badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-right: auto;
        }

        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 25px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        .header-title h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .company-logo {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(102, 126, 234, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .company-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* قسم العملاء */
        .clients-section {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 20px;
            padding: 25px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            font-size: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-width: 250px;
        }

        .filter-select {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-width: 150px;
        }

        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .client-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .client-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .client-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .client-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .client-info {
            flex: 1;
        }

        .client-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .client-email {
            font-size: 12px;
            color: #8f9bb3;
        }

        .client-stats {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 1px solid rgba(102, 126, 234, 0.1);
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
        }

        .stat-label {
            font-size: 10px;
            color: #8f9bb3;
        }

        .client-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #8f9bb3;
        }

        .client-phone {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-inactive {
            background: rgba(158, 158, 158, 0.2);
            color: #9e9e9e;
        }

        /* نافذة تفاصيل العميل */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1f35;
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
        }

        .modal-header h2 {
            color: #fff;
        }

        .modal-close {
            background: none;
            border: none;
            color: #8f9bb3;
            font-size: 24px;
            cursor: pointer;
        }

        .detail-row {
            display: flex;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .detail-label {
            width: 120px;
            color: #8f9bb3;
        }

        .detail-value {
            flex: 1;
            color: #fff;
        }

        .tickets-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .tickets-table th {
            text-align: right;
            padding: 10px;
            color: #8f9bb3;
            font-size: 12px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        .tickets-table td {
            padding: 10px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            font-size: 13px;
        }

        .ticket-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        .status-open {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-closed {
            background: rgba(158, 158, 158, 0.2);
            color: #9e9e9e;
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            margin-top: 30px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
        }

        .user-role {
            font-size: 12px;
            color: #667eea;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #f5576c;
            font-size: 20px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .filter-section {
                flex-direction: column;
            }
            
            .clients-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="tech-background"></div>

    <div class="app-container">
        <!-- القائمة الجانبية -->
        <aside class="sidebar">
            <div class="logo" id="sidebarLogo">
                <div class="logo-icon" id="logoIcon">K</div>
                <span id="sidebarCompanyName">KeyaTech</span>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="assistant-clients.html" class="nav-link active">
                        <i class="fas fa-users"></i>
                        العملاء
                        <span class="badge" id="clientsBadge">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="assistant-payments.html" class="nav-link">
                        <i class="fas fa-money-bill"></i>
                        المدفوعات
                    </a>
                </li>
            </ul>
            
            <div class="current-user">
                <div class="user-avatar" id="userAvatar">م</div>
                <div class="user-details">
                    <div class="user-name" id="userName">جاري التحميل...</div>
                    <div class="user-role">مساعد</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>إدارة العملاء</h1>
                </div>
                <div class="company-logo" id="headerLogo">
                    <i class="fas fa-building"></i>
                </div>
            </header>

            <div class="clients-section">
                <div class="section-header">
                    <h2>قائمة العملاء</h2>
                    <div>
                        <button class="btn btn-success" onclick="exportToExcel()">
                            <i class="fas fa-file-excel"></i>
                            تصدير Excel
                        </button>
                    </div>
                </div>

                <div class="filter-section">
                    <input type="text" class="search-box" id="searchInput" 
                           placeholder="🔍 بحث باسم العميل أو البريد أو الهاتف..." onkeyup="filterClients()">
                    
                    <select class="filter-select" id="statusFilter" onchange="filterClients()">
                        <option value="all">كل العملاء</option>
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                    </select>
                </div>

                <div class="clients-grid" id="clientsGrid">
                    <div style="text-align: center; padding: 50px; grid-column: 1/-1;">
                        <i class="fas fa-spinner fa-spin fa-3x"></i>
                        <p>جاري تحميل العملاء...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- نافذة تفاصيل العميل -->
    <div class="modal" id="clientModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalClientName">تفاصيل العميل</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            
            <div id="clientDetails"></div>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allClients = [];
        let allTickets = [];

        // تحميل إعدادات الشركة
        async function loadCompanySettings() {
            try {
                const doc = await db.collection('settings').doc('company').get();
                if (doc.exists) {
                    const settings = doc.data();
                    document.getElementById('sidebarCompanyName').textContent = settings.name || 'KeyaTech';
                    
                    if (settings.logoUrl) {
                        document.getElementById('logoIcon').innerHTML = `<img src="${settings.logoUrl}" style="width:100%;height:100%;object-fit:cover;">`;
                        document.getElementById('headerLogo').innerHTML = `<img src="${settings.logoUrl}" alt="شعار">`;
                    }
                }
            } catch (error) {
                console.error('Error loading company settings:', error);
            }
        }

        // التحقق من تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadCompanySettings();
                loadUserData(user.uid);
                loadAllData();
            } else {
                window.location.href = '../login.html';
            }
        });

        // تحميل بيانات المستخدم
        async function loadUserData(userId) {
            const doc = await db.collection('users').doc(userId).get();
            if (doc.exists) {
                const userData = doc.data();
                document.getElementById('userName').textContent = userData.displayName || userData.name;
                document.getElementById('userAvatar').textContent = (userData.name || 'م').charAt(0);
            }
        }

        // تحميل كل البيانات
        async function loadAllData() {
            try {
                // تحميل كل المستخدمين من نوع client
                const usersSnapshot = await db.collection('users')
                    .where('role', '==', 'client')
                    .orderBy('createdAt', 'desc')
                    .get();

                allClients = [];
                usersSnapshot.forEach(doc => {
                    allClients.push({ id: doc.id, ...doc.data() });
                });

                // تحميل كل التذاكر
                const ticketsSnapshot = await db.collection('tickets').get();
                allTickets = [];
                ticketsSnapshot.forEach(doc => {
                    allTickets.push({ id: doc.id, ...doc.data() });
                });

                document.getElementById('clientsBadge').textContent = allClients.length;
                displayClients(allClients);

            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        // عرض العملاء
        function displayClients(clients) {
            const grid = document.getElementById('clientsGrid');
            
            if (clients.length === 0) {
                grid.innerHTML = `
                    <div style="text-align: center; padding: 50px; color: #8f9bb3; grid-column: 1/-1;">
                        <i class="fas fa-user-slash fa-3x" style="margin-bottom: 15px;"></i>
                        <p>لا يوجد عملاء</p>
                    </div>
                `;
                return;
            }

            let html = '';
            clients.forEach(client => {
                // حساب إحصائيات العميل
                const clientTickets = allTickets.filter(t => t.clientEmail === client.email);
                const openTickets = clientTickets.filter(t => t.status !== 'closed').length;
                const closedTickets = clientTickets.filter(t => t.status === 'closed').length;
                
                const lastTicket = clientTickets.length > 0 ? 
                    clientTickets[0].createdAt?.toDate().toLocaleDateString('ar-EG') : '-';

                html += `
                    <div class="client-card" onclick="showClientDetails('${client.email}')">
                        <div class="client-header">
                            <div class="client-avatar">${(client.displayName || client.name || '?').charAt(0)}</div>
                            <div class="client-info">
                                <div class="client-name">${client.displayName || client.name}</div>
                                <div class="client-email">${client.email}</div>
                            </div>
                        </div>
                        
                        <div class="client-stats">
                            <div class="stat-item">
                                <div class="stat-number">${clientTickets.length}</div>
                                <div class="stat-label">إجمالي</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${openTickets}</div>
                                <div class="stat-label">مفتوحة</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${closedTickets}</div>
                                <div class="stat-label">مغلقة</div>
                            </div>
                        </div>
                        
                        <div class="client-footer">
                            <span class="client-phone">
                                <i class="fas fa-phone"></i> ${client.phone || '---'}
                            </span>
                            <span class="status-badge ${client.isActive ? 'status-active' : 'status-inactive'}">
                                ${client.isActive ? 'نشط' : 'غير نشط'}
                            </span>
                        </div>
                        <div style="font-size: 10px; color: #8f9bb3; margin-top: 10px;">
                            آخر تذكرة: ${lastTicket}
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // فلترة العملاء
        function filterClients() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            const filtered = allClients.filter(client => {
                if (statusFilter !== 'all') {
                    if (statusFilter === 'active' && !client.isActive) return false;
                    if (statusFilter === 'inactive' && client.isActive !== false) return false;
                }

                if (searchTerm) {
                    const name = (client.displayName || client.name || '').toLowerCase();
                    const email = (client.email || '').toLowerCase();
                    const phone = (client.phone || '').toLowerCase();
                    return name.includes(searchTerm) || email.includes(searchTerm) || phone.includes(searchTerm);
                }

                return true;
            });

            displayClients(filtered);
        }

        // عرض تفاصيل العميل
        async function showClientDetails(clientEmail) {
            try {
                const client = allClients.find(c => c.email === clientEmail);
                if (!client) return;

                const clientTickets = allTickets
                    .filter(t => t.clientEmail === clientEmail)
                    .sort((a, b) => {
                        const dateA = a.createdAt?.toDate() || 0;
                        const dateB = b.createdAt?.toDate() || 0;
                        return dateB - dateA;
                    });

                let ticketsHtml = '';
                if (clientTickets.length > 0) {
                    ticketsHtml = `
                        <table class="tickets-table">
                            <thead>
                                <tr>
                                    <th>رقم التذكرة</th>
                                    <th>الموضوع</th>
                                    <th>الحالة</th>
                                    <th>التاريخ</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    clientTickets.slice(0, 10).forEach(ticket => {
                        const date = ticket.createdAt ? 
                            ticket.createdAt.toDate().toLocaleDateString('ar-EG') : '-';
                        
                        ticketsHtml += `
                            <tr>
                                <td>${ticket.ticketNumber || '---'}</td>
                                <td>${ticket.problemTitle || '---'}</td>
                                <td><span class="ticket-status ${ticket.status === 'closed' ? 'status-closed' : 'status-open'}">${ticket.status === 'closed' ? 'مغلقة' : 'مفتوحة'}</span></td>
                                <td>${date}</td>
                            </tr>
                        `;
                    });

                    ticketsHtml += '</tbody></table>';
                } else {
                    ticketsHtml = '<p style="color: #8f9bb3; text-align: center;">لا توجد تذاكر</p>';
                }

                document.getElementById('modalClientName').textContent = client.displayName || client.name;
                document.getElementById('clientDetails').innerHTML = `
                    <div class="detail-row">
                        <span class="detail-label">البريد:</span>
                        <span class="detail-value">${client.email}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">الهاتف:</span>
                        <span class="detail-value">${client.phone || '---'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">الحالة:</span>
                        <span class="detail-value"><span class="status-badge ${client.isActive ? 'status-active' : 'status-inactive'}">${client.isActive ? 'نشط' : 'غير نشط'}</span></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">تاريخ التسجيل:</span>
                        <span class="detail-value">${client.createdAt ? client.createdAt.toDate().toLocaleDateString('ar-EG') : '-'}</span>
                    </div>
                    
                    <h3 style="margin: 20px 0 10px; color: #a0a0ff;">آخر التذاكر</h3>
                    ${ticketsHtml}
                `;

                document.getElementById('clientModal').classList.add('show');

            } catch (error) {
                console.error('Error showing client details:', error);
            }
        }

        // تصدير إلى Excel
        function exportToExcel() {
            const data = allClients.map(client => ({
                'الاسم': client.displayName || client.name,
                'البريد الإلكتروني': client.email,
                'رقم الهاتف': client.phone || '',
                'الحالة': client.isActive ? 'نشط' : 'غير نشط',
                'تاريخ التسجيل': client.createdAt ? client.createdAt.toDate().toLocaleDateString('ar-EG') : ''
            }));

            const csv = convertToCSV(data);
            downloadFile(csv, `clients-${Date.now()}.csv`);
        }

        // تحويل إلى CSV
        function convertToCSV(data) {
            const headers = Object.keys(data[0]).join(',');
            const rows = data.map(obj => Object.values(obj).map(val => `"${val}"`).join(','));
            return headers + '\n' + rows.join('\n');
        }

        // تحميل ملف
        function downloadFile(content, fileName) {
            const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            a.click();
        }

        function closeModal() {
            document.getElementById('clientModal').classList.remove('show');
        }

        // تسجيل الخروج
        async function logout() {
            await auth.signOut();
            window.location.href = '../login.html';
        }
    </script>
</body>
</html>
