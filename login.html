<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - KeyaTech</title>
    
    <!-- Font Awesome 6 (CDN موثوق) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts - Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (الإصدار الثابت) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== خلفية متحركة ===== */
        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .tech-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 30% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        .tech-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* ===== حاوية تسجيل الدخول ===== */
        .login-wrapper {
            width: 100%;
            max-width: 450px;
            z-index: 10;
            position: relative;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== بطاقة تسجيل الدخول (Glassmorphism) ===== */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1), transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        /* ===== الشعار ===== */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-image {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 20px;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-image .default-logo {
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        .logo-container h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .logo-container p {
            color: #666;
            font-size: 14px;
        }

        /* ===== النموذج ===== */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group label i {
            color: #667eea;
            margin-left: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
            font-size: 14px;
        }

        /* ===== زر تسجيل الدخول ===== */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 15px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.5);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* ===== رسالة الخطأ ===== */
        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
            font-weight: 500;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* ===== تذييل ===== */
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 13px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ===== شاشة التحميل ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== التجاوب مع الجوال ===== */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .logo-image {
                width: 80px;
                height: 80px;
            }
            
            .logo-container h1 {
                font-size: 24px;
            }
            
            .form-group input {
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية تكنولوجية -->
    <div class="tech-bg"></div>

    <!-- شاشة التحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- حاوية تسجيل الدخول -->
    <div class="login-wrapper">
        <div class="login-card">
            <!-- الشعار -->
            <div class="logo-container">
                <div class="logo-image" id="logoImage">
                    <span class="default-logo" id="defaultLogo">K</span>
                    <img id="companyLogo" src="" alt="شعار الشركة" style="display: none;">
                </div>
                <h1 id="companyName">KeyaTech</h1>
                <p>نظام إدارة الدعم الفني المتكامل</p>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        الاسم بالكامل
                    </label>
                    <input 
                        type="text" 
                        id="loginName" 
                        placeholder="أدخل اسمك بالكامل" 
                        required
                        autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        كلمة المرور
                    </label>
                    <input 
                        type="password" 
                        id="loginPassword" 
                        placeholder="أدخل كلمة المرور" 
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>

                <!-- رسالة الخطأ -->
                <div class="error-message" id="errorMessage"></div>
            </form>

            <!-- تذييل -->
            <div class="footer">
                <p>© 2026 جميع الحقوق محفوظة لـ <a href="#">KeyaTech</a></p>
            </div>
        </div>
    </div>

    <script>
        // ===== تهيئة Firebase =====
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        // تهيئة Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== عناصر الصفحة =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const companyNameEl = document.getElementById('companyName');
        const defaultLogo = document.getElementById('defaultLogo');
        const companyLogo = document.getElementById('companyLogo');

        // ===== إظهار/إخفاء التحميل =====
        function showLoading(show) {
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        // ===== تحميل إعدادات الشركة =====
        async function loadCompanySettings() {
            try {
                const doc = await db.collection('settings').doc('company').get();
                if (doc.exists) {
                    const settings = doc.data();
                    
                    // اسم الشركة
                    if (settings.name) {
                        companyNameEl.textContent = settings.name;
                    }

                    // شعار الشركة
                    if (settings.logoUrl) {
                        companyLogo.src = settings.logoUrl;
                        companyLogo.style.display = 'block';
                        defaultLogo.style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('Error loading company settings:', error);
            }
        }

        // ===== التحقق من وجود مستخدم مسجل بالفعل =====
        auth.onAuthStateChanged((user) => {
            if (user) {
                // إذا كان هناك مستخدم مسجل، نوجهه للصفحة الرئيسية
                window.location.href = 'index.html';
            } else {
                // تحميل إعدادات الشركة
                loadCompanySettings();
            }
        });

        // ===== دالة تسجيل الدخول =====
        async function handleLogin(event) {
            event.preventDefault();

            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPassword').value;

            // التحقق من إدخال البيانات
            if (!name || !password) {
                showError('يرجى إدخال الاسم وكلمة المرور');
                return;
            }

            // إظهار التحميل
            showLoading(true);
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';
            errorMessage.style.display = 'none';

            try {
                console.log('🔍 جاري البحث عن المستخدم:', name);

                // البحث عن المستخدم بالاسم
                const usersSnapshot = await db.collection('users')
                    .where('displayName', '==', name)
                    .where('isActive', '==', true)
                    .limit(1)
                    .get();

                if (usersSnapshot.empty) {
                    throw new Error('اسم المستخدم غير صحيح أو الحساب غير نشط');
                }

                const userDoc = usersSnapshot.docs[0];
                const userData = userDoc.data();
                const userId = userDoc.id;

                console.log('✅ تم العثور على المستخدم:', userData.email);

                // تسجيل الدخول باستخدام البريد الإلكتروني
                const userCredential = await auth.signInWithEmailAndPassword(userData.email, password);

                console.log('✅ تم تسجيل الدخول بنجاح');

                // تحديث حالة المستخدم
                await db.collection('users').doc(userId).update({
                    isOnline: true,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });

                // تسجيل الجلسة
                await db.collection('sessions').add({
                    userId: userId,
                    userName: userData.displayName || userData.name,
                    loginTime: firebase.firestore.FieldValue.serverTimestamp(),
                    userAgent: navigator.userAgent,
                    ipAddress: 'غير معروف'
                });

                // تأخير بسيط قبل التوجيه
                setTimeout(() => {
                    // التوجيه حسب الدور
                    if (userData.role === 'admin') {
                        window.location.href = 'admin/admin-dashboard.html';
                    } else if (userData.role === 'engineer') {
                        window.location.href = 'engineer/engineer-tickets.html';
                    } else if (userData.role === 'assistant') {
                        window.location.href = 'assistant/assistant-clients.html';
                    } else {
                        window.location.href = 'client/client-dashboard.html';
                    }
                }, 500);

            } catch (error) {
                console.error('❌ خطأ في تسجيل الدخول:', error);

                // إخفاء التحميل
                showLoading(false);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';

                // رسالة الخطأ المناسبة
                let message = 'اسم المستخدم أو كلمة المرور غير صحيحة';

                if (error.code === 'auth/wrong-password') {
                    message = 'كلمة المرور غير صحيحة';
                } else if (error.code === 'auth/user-not-found') {
                    message = 'المستخدم غير موجود';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'تم حظر الحساب مؤقتاً لكثرة المحاولات الفاشلة';
                } else if (error.message) {
                    message = error.message;
                }

                showError(message);
            }
        }

        // ===== إظهار رسالة الخطأ =====
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';

            // إخفاء الرسالة بعد 5 ثواني
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        // ===== إضافة تأثيرات عند تحميل الصفحة =====
        window.addEventListener('load', () => {
            // إضافة تأثير fade in للحقول
            const inputs = document.querySelectorAll('.form-group');
            inputs.forEach((input, index) => {
                input.style.opacity = '0';
                input.style.transform = 'translateY(20px)';
                
                setTimeout(() => {
                    input.style.transition = 'all 0.5s ease';
                    input.style.opacity = '1';
                    input.style.transform = 'translateY(0)';
                }, 100 + (index * 100));
            });
        });
    </script>
</body>
</html>
