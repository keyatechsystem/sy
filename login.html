<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - KeyaTech</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .logo-icon span {
            font-size: 40px;
            font-weight: bold;
            color: white;
        }

        .login-logo h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .login-logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
        }

        .demo-credentials {
            margin-top: 25px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 13px;
        }

        .demo-credentials p {
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .demo-credentials ul {
            list-style: none;
            color: #666;
        }

        .demo-credentials li {
            margin-bottom: 5px;
            padding: 5px;
            background: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <span>K</span>
                </div>
                <h1>KeyaTech</h1>
                <p>نظام إدارة الدعم الفني المتكامل</p>
            </div>
            
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> الاسم بالكامل</label>
                    <input type="text" id="loginName" placeholder="أدخل اسمك بالكامل" required>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>
                
                <div class="login-error" id="loginError"></div>
            </form>
            
            <div class="demo-credentials">
                <p>🔐 بيانات الدخول التجريبية:</p>
                <ul>
                    <li><i class="fas fa-user-tie"></i> المدير: محمود جميل / keyatech@2026@</li>
                    <li><i class="fas fa-user-cog"></i> مهندس: أحمد علي / keyatech@2026@</li>
                    <li><i class="fas fa-user"></i> مساعد: سارة محمد / keyatech@2026@</li>
                </ul>
            </div>
            
            <div class="login-footer">
                <p>ليس لديك حساب؟ <a href="#">تواصل مع الإدارة</a></p>
            </div>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // التحقق من وجود مستخدم مسجل بالفعل
        auth.onAuthStateChanged((user) => {
            if (user) {
                // إذا كان هناك مستخدم مسجل، اذهب للصفحة الرئيسية
                window.location.href = 'index.html';
            }
        });

        // تسجيل الدخول
        async function handleLogin(event) {
            event.preventDefault();
            
            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            // إظهار التحميل
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';
            loginBtn.disabled = true;
            
            // إخفاء أي أخطاء سابقة
            document.getElementById('loginError').style.display = 'none';
            
            try {
                console.log('جاري البحث عن المستخدم:', name);
                
                // البحث عن المستخدم بالاسم
                const usersSnapshot = await db.collection('users')
                    .where('displayName', '==', name)
                    .where('isActive', '==', true)
                    .limit(1)
                    .get();
                
                if (usersSnapshot.empty) {
                    throw new Error('اسم المستخدم غير صحيح أو الحساب غير نشط');
                }
                
                const userDoc = usersSnapshot.docs[0];
                const userData = userDoc.data();
                const userId = userDoc.id;
                
                console.log('تم العثور على المستخدم:', userData.email);
                
                // تسجيل الدخول بالبريد الإلكتروني
                const userCredential = await auth.signInWithEmailAndPassword(userData.email, password);
                
                console.log('تم تسجيل الدخول بنجاح');
                
                // تحديث حالة المستخدم
                await db.collection('users').doc(userId).update({
                    isOnline: true,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });

                // تسجيل الجلسة
                await db.collection('onlineSessions').add({
                    userId: userId,
                    userName: userData.displayName || userData.name,
                    loginTime: firebase.firestore.FieldValue.serverTimestamp(),
                    userAgent: navigator.userAgent
                });

                // التوجيه حسب الدور - استخدام مسار نسبي
                console.log('توجيه المستخدم حسب الدور:', userData.role);
                
                // تأخير بسيط قبل التوجيه
                setTimeout(() => {
                    if (userData.role === 'admin') {
                        window.location.href = 'admin/admin-dashboard.html';
                    } else if (userData.role === 'engineer') {
                        window.location.href = 'engineer/engineer-tickets.html';
                    } else if (userData.role === 'assistant') {
                        window.location.href = 'assistant/assistant-clients.html';
                    } else {
                        window.location.href = 'client/client-dashboard.html';
                    }
                }, 500);
                
            } catch (error) {
                console.error('خطأ في تسجيل الدخول:', error);
                
                // إخفاء التحميل وإظهار الخطأ
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
                
                let errorMessage = 'اسم المستخدم أو كلمة المرور غير صحيحة';
                
                if (error.code === 'auth/wrong-password') {
                    errorMessage = 'كلمة المرور غير صحيحة';
                } else if (error.code === 'auth/user-not-found') {
                    errorMessage = 'المستخدم غير موجود';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'تم حظر الحساب مؤقتاً لكثرة المحاولات الفاشلة';
                } else if (error.message) {
                    errorMessage = error.message;
                }
                
                document.getElementById('loginError').textContent = errorMessage;
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>
</body>
</html>
