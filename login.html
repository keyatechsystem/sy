<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyaTech 2099 - تسجيل الدخول</title>
    
    <!-- Font Awesome 6 (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts - Orbitron + Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ===== خلفية تكنولوجية متحركة ===== */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .grid-3d {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(800px) rotateX(60deg);
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(800px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(800px) rotateX(60deg) translateY(50px); }
        }

        .cyber-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s ease-in-out infinite;
        }

        .cyber-circle:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: rgba(0, 243, 255, 0.2);
        }

        .cyber-circle:nth-child(2) {
            width: 500px;
            height: 500px;
            bottom: -200px;
            left: -200px;
            background: rgba(255, 0, 255, 0.2);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-50px) scale(1.1); }
        }

        .light-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .light-lines::before,
        .light-lines::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f3ff, #ff00ff, transparent);
            animation: lightMove 15s linear infinite;
        }

        .light-lines::before {
            top: 30%;
            left: -50%;
        }

        .light-lines::after {
            bottom: 30%;
            right: -50%;
            animation-delay: -7.5s;
        }

        @keyframes lightMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ===== الحاوية الرئيسية ===== */
        .login-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        /* ===== بطاقة تسجيل الدخول ===== */
        .login-card {
            width: 100%;
            max-width: 500px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            animation: slideUp 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #00f3ff, #ff00ff, #00f3ff);
            border-radius: 42px;
            z-index: -1;
            animation: borderGlow 3s linear infinite;
            opacity: 0.5;
        }

        @keyframes borderGlow {
            0%, 100% { filter: blur(5px); }
            50% { filter: blur(10px); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== الشعار ===== */
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #00f3ff, #ff00ff);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.5);
            animation: pulse 2s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 50px rgba(0, 243, 255, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(255, 0, 255, 0.5); }
        }

        @keyframes shimmer {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        .logo-container h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00f3ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .logo-container p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        /* ===== النموذج ===== */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #00f3ff;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .form-group label i {
            margin-left: 8px;
            color: #ff00ff;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0, 243, 255, 0.5);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 15px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-wrapper input:focus + i {
            color: #ff00ff;
            transform: translateY(-50%) scale(1.2);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }

        /* ===== خيارات إضافية ===== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00f3ff;
        }

        .forgot-password {
            color: #ff00ff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-password::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #ff00ff;
            transition: width 0.3s ease;
        }

        .forgot-password:hover {
            color: #00f3ff;
        }

        .forgot-password:hover::after {
            width: 100%;
            background: #00f3ff;
        }

        /* ===== زر تسجيل الدخول ===== */
        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00f3ff, #ff00ff);
            border: none;
            border-radius: 15px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.5);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== رسالة الخطأ ===== */
        .error-message {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff3366;
            color: #ff3366;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ===== معلومات تجريبية ===== */
        .demo-info {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .demo-info h4 {
            color: #00f3ff;
            margin-bottom: 15px;
            text-align: center;
            font-size: 16px;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .demo-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .demo-item:hover {
            background: rgba(0, 243, 255, 0.2);
            transform: translateY(-3px);
        }

        .demo-item i {
            color: #ff00ff;
            margin-bottom: 5px;
            font-size: 20px;
        }

        .demo-item .name {
            color: #fff;
            font-size: 12px;
            font-weight: 600;
        }

        .demo-item .role {
            color: rgba(255, 255, 255, 0.5);
            font-size: 10px;
        }

        /* ===== تذييل ===== */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }

        /* ===== ماوس مخصص ===== */
        .custom-cursor {
            width: 40px;
            height: 40px;
            border: 2px solid #00f3ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            mix-blend-mode: difference;
            box-shadow: 0 0 20px #00f3ff;
        }

        .cursor-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
            box-shadow: 0 0 15px #fff;
        }

        /* ===== شاشة التحميل ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100000;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 243, 255, 0.3);
            border-top-color: #00f3ff;
            border-right-color: #ff00ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== التجاوب مع الجوال ===== */
        @media (max-width: 768px) {
            .login-card {
                padding: 30px 20px;
            }

            .logo-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }

            .logo-container h1 {
                font-size: 28px;
            }

            .demo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .form-options {
                flex-direction: column;
                gap: 15px;
            }

            .demo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="cyber-bg">
        <div class="grid-3d"></div>
        <div class="cyber-circle"></div>
        <div class="cyber-circle"></div>
        <div class="light-lines"></div>
    </div>

    <!-- ماوس مخصص -->
    <div class="custom-cursor" id="customCursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- شاشة تحميل -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- حاوية تسجيل الدخول -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo-icon" id="logoIcon">
                    <span>K</span>
                </div>
                <h1 id="companyName">KeyaTech</h1>
                <p>نظام إدارة الدعم الفني المتكامل</p>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        الاسم بالكامل
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            id="loginName" 
                            placeholder="أدخل اسمك بالكامل" 
                            required
                            autocomplete="off"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        كلمة المرور
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            placeholder="أدخل كلمة المرور" 
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>تذكرني</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="forgotPassword(event)">
                        نسيت كلمة المرور؟
                    </a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    تسجيل الدخول
                </button>

                <!-- رسالة الخطأ -->
                <div class="error-message" id="errorMessage"></div>
            </form>

            <!-- بيانات تجريبية -->
            <div class="demo-info">
                <h4><i class="fas fa-flask"></i> بيانات تجريبية</h4>
                <div class="demo-grid">
                    <div class="demo-item" onclick="fillDemo('محمود جميل', 'keyatech@2020@')">
                        <i class="fas fa-crown"></i>
                        <div class="name">محمود جميل</div>
                        <div class="role">مدير</div>
                    </div>
                    <div class="demo-item" onclick="fillDemo('أحمد علي', 'keyatech@2020@')">
                        <i class="fas fa-code"></i>
                        <div class="name">أحمد علي</div>
                        <div class="role">مهندس</div>
                    </div>
                    <div class="demo-item" onclick="fillDemo('سارة محمد', 'keyatech@2020@')">
                        <i class="fas fa-headset"></i>
                        <div class="name">سارة محمد</div>
                        <div class="role">مساعد</div>
                    </div>
                </div>
            </div>

            <div class="footer">
                <p>© 2026 KeyaTech - جميع الحقوق محفوظة</p>
            </div>
        </div>
    </div>

    <script>
        // ===== تهيئة Firebase =====
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== عناصر الصفحة =====
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const companyName = document.getElementById('companyName');
        const logoIcon = document.getElementById('logoIcon');

        // ===== ماوس مخصص =====
        const cursor = document.getElementById('customCursor');
        const cursorDot = document.getElementById('cursorDot');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            cursorDot.style.opacity = '0';
        });

        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            cursorDot.style.opacity = '1';
        });

        // ===== تحميل إعدادات الشركة =====
        async function loadCompanySettings() {
            try {
                const doc = await db.collection('settings').doc('company').get();
                if (doc.exists) {
                    const settings = doc.data();
                    companyName.textContent = settings.name || 'KeyaTech';
                    
                    if (settings.logoUrl) {
                        logoIcon.innerHTML = `<img src="${settings.logoUrl}" style="width:100%;height:100%;object-fit:cover;" alt="شعار">`;
                    }
                }
            } catch (error) {
                console.error('Error loading company settings:', error);
            }
        }

        // ===== التحقق من وجود مستخدم مسجل =====
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            } else {
                loadCompanySettings();
            }
        });

        // ===== إظهار/إخفاء التحميل =====
        function showLoading(show) {
            loadingOverlay.style.display = show ? 'flex' : 'none';
        }

        // ===== تعبئة بيانات تجريبية =====
        function fillDemo(name, password) {
            document.getElementById('loginName').value = name;
            document.getElementById('loginPassword').value = password;
            
            // تأثير وميض
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.style.borderColor = '#00f3ff';
                input.style.boxShadow = '0 0 20px #00f3ff';
                setTimeout(() => {
                    input.style.borderColor = '';
                    input.style.boxShadow = '';
                }, 500);
            });
        }

        // ===== نسيت كلمة المرور =====
        function forgotPassword(event) {
            event.preventDefault();
            alert('الرجاء التواصل مع مدير النظام لإعادة تعيين كلمة المرور');
        }

        // ===== تسجيل الدخول =====
        async function handleLogin(event) {
            event.preventDefault();

            const name = document.getElementById('loginName').value.trim();
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!name || !password) {
                showError('يرجى إدخال الاسم وكلمة المرور');
                return;
            }

            showLoading(true);
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';
            errorMessage.style.display = 'none';

            try {
                // البحث عن المستخدم بالاسم
                const usersSnapshot = await db.collection('users')
                    .where('displayName', '==', name)
                    .where('isActive', '==', true)
                    .limit(1)
                    .get();

                if (usersSnapshot.empty) {
                    throw new Error('اسم المستخدم غير صحيح أو الحساب غير نشط');
                }

                const userDoc = usersSnapshot.docs[0];
                const userData = userDoc.data();
                const userId = userDoc.id;

                // تسجيل الدخول
                const userCredential = await auth.signInWithEmailAndPassword(userData.email, password);

                // تحديث حالة المستخدم
                await db.collection('users').doc(userId).update({
                    isOnline: true,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });

                // تسجيل الجلسة
                await db.collection('sessions').add({
                    userId: userId,
                    userName: userData.displayName || userData.name,
                    loginTime: firebase.firestore.FieldValue.serverTimestamp(),
                    userAgent: navigator.userAgent,
                    remember: remember
                });

                showLoading(false);

                // التوجيه حسب الدور
                setTimeout(() => {
                    if (userData.role === 'admin') {
                        window.location.href = 'admin/admin-dashboard.html';
                    } else if (userData.role === 'engineer') {
                        window.location.href = 'engineer/engineer-tickets.html';
                    } else if (userData.role === 'assistant') {
                        window.location.href = 'assistant/assistant-clients.html';
                    } else {
                        window.location.href = 'client/client-dashboard.html';
                    }
                }, 500);

            } catch (error) {
                console.error('Login error:', error);
                
                showLoading(false);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';

                let message = 'اسم المستخدم أو كلمة المرور غير صحيحة';
                
                if (error.code === 'auth/wrong-password') {
                    message = 'كلمة المرور غير صحيحة';
                } else if (error.code === 'auth/user-not-found') {
                    message = 'المستخدم غير موجود';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'تم حظر الحساب مؤقتاً، حاول لاحقاً';
                } else if (error.message) {
                    message = error.message;
                }

                showError(message);
            }
        }

        // ===== إظهار رسالة الخطأ =====
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';

            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        // ===== تأثيرات على الماوس =====
        const interactiveElements = document.querySelectorAll('.demo-item, .login-btn, .forgot-password');
        
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.borderColor = '#ff00ff';
                cursor.style.boxShadow = '0 0 20px #ff00ff';
            });
            
            el.addEventListener('mouseleave', () => {
                cursor.style.borderColor = '#00f3ff';
                cursor.style.boxShadow = '0 0 20px #00f3ff';
            });
        });

        // ===== جعل fillDemo متاح عالمياً =====
        window.fillDemo = fillDemo;
        window.forgotPassword = forgotPassword;
    </script>
</body>
</html>
