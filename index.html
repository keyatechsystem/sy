<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyaTech - نظام إدارة الدعم الفني</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .splash-container {
            text-align: center;
            color: white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .logo span {
            font-size: 60px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .loading {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo">
            <span>K</span>
        </div>
        <h1>KeyaTech</h1>
        <p>نظام إدارة الدعم الفني المتكامل</p>
        <div class="loading"></div>
        <p>جاري تحميل النظام...</p>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // التحقق من حالة تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            setTimeout(() => {
                if (user) {
                    console.log('مستخدم مسجل:', user.email);
                    
                    // جلب بيانات المستخدم من Firestore
                    db.collection('users').doc(user.uid).get()
                        .then((doc) => {
                            if (doc.exists) {
                                const userData = doc.data();
                                console.log('بيانات المستخدم:', userData);
                                
                                // التوجيه حسب الدور - استخدام مسارات نسبية
                                if (userData.role === 'admin') {
                                    window.location.href = 'admin/admin-dashboard.html';
                                } else if (userData.role === 'engineer') {
                                    window.location.href = 'engineer/engineer-tickets.html';
                                } else if (userData.role === 'assistant') {
                                    window.location.href = 'assistant/assistant-clients.html';
                                } else {
                                    // إذا كان عميل عادي
                                    window.location.href = 'client/client-dashboard.html';
                                }
                            } else {
                                // المستخدم موجود في Authentication لكن مش في Firestore
                                console.log('المستخدم غير موجود في Firestore');
                                window.location.href = 'login.html';
                            }
                        })
                        .catch((error) => {
                            console.error('خطأ في جلب بيانات المستخدم:', error);
                            window.location.href = 'login.html';
                        });
                } else {
                    // لا يوجد مستخدم مسجل - اذهب لصفحة تسجيل الدخول
                    console.log('لا يوجد مستخدم مسجل');
                    window.location.href = 'login.html';
                }
            }, 2000); // تأخير 2 ثانية لعرض شاشة البداية
        });
    </script>
</body>
</html>
