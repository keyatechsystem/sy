<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyaTech 2099 - المستقبل يبدأ الآن</title>
    
    <!-- Font Awesome 6 (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts - Orbitron للعناوين + Cairo للمحتوى -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ===== خلفية تكنولوجية متحركة ===== */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        /* شبكة ثلاثية الأبعاد */
        .grid-3d {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(800px) rotateX(60deg);
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(800px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(800px) rotateX(60deg) translateY(50px); }
        }

        /* دوائر متحركة */
        .cyber-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s ease-in-out infinite;
        }

        .cyber-circle:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: rgba(0, 243, 255, 0.2);
        }

        .cyber-circle:nth-child(2) {
            width: 500px;
            height: 500px;
            bottom: -200px;
            left: -200px;
            background: rgba(255, 0, 255, 0.2);
            animation-delay: -5s;
        }

        .cyber-circle:nth-child(3) {
            width: 400px;
            height: 400px;
            top: 20%;
            left: 10%;
            background: rgba(255, 255, 0, 0.15);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-50px) scale(1.1); }
        }

        /* خطوط ضوئية */
        .light-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .light-lines::before,
        .light-lines::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f3ff, #ff00ff, #ffff00, transparent);
            animation: lightMove 15s linear infinite;
        }

        .light-lines::before {
            top: 30%;
            left: -50%;
        }

        .light-lines::after {
            bottom: 30%;
            right: -50%;
            animation-delay: -7.5s;
        }

        @keyframes lightMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* جزيئات متحركة */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00f3ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00f3ff;
            animation: particleFloat 15s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* ===== الحاوية الرئيسية ===== */
        .splash-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== الشعار ===== */
        .logo-container {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 1s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-3d {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate3D 10s linear infinite;
        }

        @keyframes rotate3D {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        .logo-face {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00f3ff, #ff00ff);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.5);
            backface-visibility: hidden;
        }

        .logo-face.front { transform: translateZ(40px); }
        .logo-face.back { transform: rotateY(180deg) translateZ(40px); }
        .logo-face.right { transform: rotateY(90deg) translateZ(40px); }
        .logo-face.left { transform: rotateY(-90deg) translateZ(40px); }
        .logo-face.top { transform: rotateX(90deg) translateZ(40px); }
        .logo-face.bottom { transform: rotateX(-90deg) translateZ(40px); }

        .glitch-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 800;
            text-transform: uppercase;
            color: transparent;
            -webkit-text-stroke: 2px #00f3ff;
            text-shadow: 
                0 0 10px #00f3ff,
                0 0 20px #00f3ff,
                0 0 40px #00f3ff;
            letter-spacing: 8px;
            margin-bottom: 10px;
            position: relative;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% {
                text-shadow: 
                    0 0 10px #00f3ff,
                    0 0 20px #00f3ff,
                    0 0 40px #00f3ff;
                transform: skew(0deg);
            }
            20% {
                text-shadow: 
                    -2px 0 #ff00ff,
                    2px 0 #00f3ff;
                transform: skew(2deg);
            }
            40% {
                text-shadow: 
                    2px -2px #ffff00,
                    -2px 2px #ff00ff;
                transform: skew(-2deg);
            }
            60% {
                text-shadow: 
                    -2px 2px #00f3ff,
                    2px -2px #ffff00;
                transform: skew(2deg);
            }
            80% {
                text-shadow: 
                    2px 0 #ff00ff,
                    -2px 0 #00f3ff;
                transform: skew(-2deg);
            }
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease 0.3s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== شريط التحميل ===== */
        .loading-container {
            width: 300px;
            text-align: center;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f3ff, #ff00ff, #ffff00);
            background-size: 200% 100%;
            animation: gradientMove 2s linear infinite, progress 2s ease-out forwards;
            border-radius: 2px;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: #00f3ff;
            letter-spacing: 2px;
        }

        .loading-text i {
            margin: 0 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===== إحصائيات ===== */
        .stats {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 50px;
            animation: fadeInUp 1s ease 1s both;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        /* ===== حقوق الملكية ===== */
        .copyright {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            animation: fadeIn 2s ease 1.5s both;
        }

        /* ===== الماوس المخصص ===== */
        .custom-cursor {
            width: 40px;
            height: 40px;
            border: 2px solid #00f3ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
            mix-blend-mode: difference;
            box-shadow: 0 0 20px #00f3ff;
        }

        .cursor-dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: all 0.1s ease;
            box-shadow: 0 0 15px #fff;
        }

        /* ===== التجاوب مع الجوال ===== */
        @media (max-width: 768px) {
            .glitch-text {
                font-size: 36px;
                letter-spacing: 4px;
            }

            .logo-3d {
                width: 120px;
                height: 120px;
            }

            .logo-face {
                font-size: 60px;
            }

            .stats {
                gap: 20px;
                flex-wrap: wrap;
                bottom: 20px;
            }

            .copyright {
                bottom: 10px;
                right: 15px;
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .glitch-text {
                font-size: 28px;
                letter-spacing: 2px;
            }

            .logo-3d {
                width: 100px;
                height: 100px;
            }

            .logo-face {
                font-size: 50px;
            }

            .subtitle {
                font-size: 14px;
            }

            .loading-container {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="cyber-bg">
        <div class="grid-3d"></div>
        <div class="cyber-circle"></div>
        <div class="cyber-circle"></div>
        <div class="cyber-circle"></div>
        <div class="light-lines"></div>
    </div>

    <!-- جزيئات متحركة -->
    <div class="particles" id="particles"></div>

    <!-- ماوس مخصص -->
    <div class="custom-cursor" id="customCursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- المحتوى الرئيسي -->
    <div class="splash-container">
        <div class="logo-container">
            <div class="logo-3d">
                <div class="logo-face front">K</div>
                <div class="logo-face back">T</div>
                <div class="logo-face right">2</div>
                <div class="logo-face left">0</div>
                <div class="logo-face top">9</div>
                <div class="logo-face bottom">9</div>
            </div>
            <h1 class="glitch-text" data-text="KEYATECH">KEYATECH</h1>
            <p class="subtitle">نظام إدارة الدعم الفني المتكامل</p>
        </div>

        <div class="loading-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="loading-text" id="loadingText">
                <i class="fas fa-circle"></i> جاري تحميل النظام <i class="fas fa-circle"></i>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="statUsers">0</div>
                <div class="stat-label">مستخدم</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statTickets">0</div>
                <div class="stat-label">تذكرة</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statOnline">0</div>
                <div class="stat-label">متصل</div>
            </div>
        </div>

        <div class="copyright">
            © 2026 KeyaTech - جميع الحقوق محفوظة
        </div>
    </div>

    <script>
        // ===== تهيئة Firebase =====
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== عناصر الصفحة =====
        const loadingText = document.getElementById('loadingText');
        const progressFill = document.getElementById('progressFill');
        const statUsers = document.getElementById('statUsers');
        const statTickets = document.getElementById('statTickets');
        const statOnline = document.getElementById('statOnline');

        // ===== نظام الجزيئات =====
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // موقع عشوائي
                const left = Math.random() * 100;
                const delay = Math.random() * 20;
                const duration = 10 + Math.random() * 20;
                
                particle.style.left = left + '%';
                particle.style.animationDelay = delay + 's';
                particle.style.animationDuration = duration + 's';
                
                particlesContainer.appendChild(particle);
            }
        }

        // ===== نظام الماوس المخصص =====
        const cursor = document.getElementById('customCursor');
        const cursorDot = document.getElementById('cursorDot');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        // إخفاء الماوس عند مغادرة النافذة
        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            cursorDot.style.opacity = '0';
        });

        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            cursorDot.style.opacity = '1';
        });

        // ===== تغيير نص التحميل =====
        const messages = [
            'تشغيل الأنظمة...',
            'تحميل البيانات...',
            'تجهيز الواجهات...',
            'ربط قواعد البيانات...',
            'تفعيل الحماية...',
            'تهيئة البيئة...'
        ];

        let messageIndex = 0;
        const messageInterval = setInterval(() => {
            messageIndex = (messageIndex + 1) % messages.length;
            loadingText.innerHTML = `<i class="fas fa-circle"></i> ${messages[messageIndex]} <i class="fas fa-circle"></i>`;
        }, 2000);

        // ===== تحميل الإحصائيات =====
        async function loadStats() {
            try {
                // عدد المستخدمين
                const usersSnapshot = await db.collection('users').get();
                statUsers.textContent = usersSnapshot.size;

                // عدد التذاكر
                const ticketsSnapshot = await db.collection('tickets').get();
                statTickets.textContent = ticketsSnapshot.size;

                // عدد المتصلين
                let onlineCount = 0;
                usersSnapshot.forEach(doc => {
                    if (doc.data().isOnline) onlineCount++;
                });
                statOnline.textContent = onlineCount;

            } catch (error) {
                console.error('Error loading stats:', error);
                // بيانات افتراضية
                statUsers.textContent = '0';
                statTickets.textContent = '0';
                statOnline.textContent = '0';
            }
        }

        // ===== التوجيه بعد التحميل =====
        auth.onAuthStateChanged((user) => {
            // تحميل الإحصائيات
            loadStats();

            // التوجيه بعد 4 ثواني
            setTimeout(() => {
                clearInterval(messageInterval);
                
                if (user) {
                    db.collection('users').doc(user.uid).get().then((doc) => {
                        if (doc.exists) {
                            const userData = doc.data();
                            
                            if (userData.role === 'admin') {
                                window.location.href = 'admin/admin-dashboard.html';
                            } else if (userData.role === 'engineer') {
                                window.location.href = 'engineer/engineer-tickets.html';
                            } else if (userData.role === 'assistant') {
                                window.location.href = 'assistant/assistant-clients.html';
                            } else {
                                window.location.href = 'client/client-dashboard.html';
                            }
                        } else {
                            window.location.href = 'login.html';
                        }
                    }).catch(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    window.location.href = 'login.html';
                }
            }, 4000);
        });

        // ===== تشغيل الجزيئات =====
        createParticles();

        // ===== تأثيرات إضافية =====
        // تغيير لون الماوس على العناصر القابلة للتفاعل
        const interactiveElements = document.querySelectorAll('a, button, .logo-3d');
        
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.borderColor = '#ff00ff';
                cursor.style.boxShadow = '0 0 20px #ff00ff';
            });
            
            el.addEventListener('mouseleave', () => {
                cursor.style.borderColor = '#00f3ff';
                cursor.style.boxShadow = '0 0 20px #00f3ff';
            });
        });
    </script>
</body>
</html>
