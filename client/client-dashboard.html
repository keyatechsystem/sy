<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم العميل - KeyaTech</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0f1e;
            color: #fff;
        }

        /* الخلفية المتحركة */
        .tech-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1f35 0%, #0a0f1e 100%);
        }

        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(102, 126, 234, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 126, 234, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 15s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* الحاوية الرئيسية */
        .app-container {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(102, 126, 234, 0.2);
            padding: 25px;
            position: fixed;
            height: 100vh;
            right: 0;
            top: 0;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .logo span {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: #8f9bb3;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(102, 126, 234, 0.1);
            color: #fff;
        }

        .nav-link i {
            width: 24px;
            color: #667eea;
        }

        .badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-right: auto;
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 25px;
        }

        /* الهيدر */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .header-title h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .company-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .company-logo {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(102, 126, 234, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .company-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .company-logo i {
            font-size: 24px;
            color: #667eea;
        }

        .company-name {
            font-weight: 600;
            color: #fff;
        }

        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
            color: #fff;
        }

        .stat-label {
            color: #8f9bb3;
            font-size: 14px;
        }

        /* قائمة التذاكر */
        .tickets-list {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 20px;
            padding: 25px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 20px;
        }

        .view-all {
            color: #667eea;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .ticket-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }

        .ticket-item:last-child {
            border-bottom: none;
        }

        .ticket-info {
            flex: 1;
        }

        .ticket-number {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .ticket-subject {
            font-size: 14px;
            color: #8f9bb3;
        }

        .ticket-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-open {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-progress {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }

        .status-closed {
            background: rgba(158, 158, 158, 0.2);
            color: #9e9e9e;
        }

        .btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #8f9bb3;
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            margin-top: 30px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .current-user .user-details {
            flex: 1;
        }

        .current-user .user-name {
            font-weight: 600;
        }

        .current-user .user-role {
            font-size: 12px;
            color: #667eea;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #f5576c;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="tech-background">
        <div class="grid-overlay"></div>
    </div>

    <div class="app-container">
        <!-- القائمة الجانبية -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">K</div>
                <span>KeyaTech</span>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="client-dashboard.html" class="nav-link active">
                        <i class="fas fa-home"></i>
                        الرئيسية
                    </a>
                </li>
                <li class="nav-item">
                    <a href="client-new-ticket.html" class="nav-link">
                        <i class="fas fa-plus-circle"></i>
                        شكوى جديدة
                    </a>
                </li>
                <li class="nav-item">
                    <a href="client-tickets.html" class="nav-link">
                        <i class="fas fa-tickets"></i>
                        شكاويي
                        <span class="badge" id="ticketsCount">0</span>
                    </a>
                </li>
            </ul>
            
            <div class="current-user">
                <div class="user-avatar" id="userAvatar">م</div>
                <div class="user-details">
                    <div class="user-name" id="userName">جاري التحميل...</div>
                    <div class="user-role">عميل</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>مرحباً بعودتك 👋</h1>
                </div>
                <div class="company-info" id="companyInfo">
                    <div class="company-logo">
                        <i class="fas fa-building"></i>
                    </div>
                    <span class="company-name" id="companyName">KeyaTech</span>
                </div>
            </header>

            <!-- بطاقات الإحصائيات -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-tickets"></i>
                    </div>
                    <div class="stat-value" id="totalTickets">0</div>
                    <div class="stat-label">إجمالي الشكاوي</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-spinner"></i>
                    </div>
                    <div class="stat-value" id="openTickets">0</div>
                    <div class="stat-label">قيد المعالجة</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-value" id="closedTickets">0</div>
                    <div class="stat-label">تم الحل</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-value" id="lastTicket">-</div>
                    <div class="stat-label">آخر شكوى</div>
                </div>
            </div>

            <!-- آخر الشكاوي -->
            <div class="tickets-list">
                <div class="section-header">
                    <h2>آخر الشكاوي</h2>
                    <a href="client-tickets.html" class="view-all">
                        عرض الكل
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>

                <div id="recentTickets">
                    <!-- سيتم إضافة الشكاوي ديناميكياً -->
                </div>

                <a href="client-new-ticket.html" class="btn" style="width: 100%; margin-top: 20px; justify-content: center;">
                    <i class="fas fa-plus"></i>
                    شكوى جديدة
                </a>
            </div>
        </main>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentClient = null;

        // التحقق من تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadUserData(user.uid);
                loadCompanySettings();
            } else {
                window.location.href = '/login.html';
            }
        });

        // تحميل بيانات المستخدم
        async function loadUserData(userId) {
            try {
                const doc = await db.collection('users').doc(userId).get();
                if (doc.exists) {
                    currentClient = doc.data();
                    document.getElementById('userName').textContent = currentClient.displayName || currentClient.name;
                    document.getElementById('userAvatar').textContent = (currentClient.name || 'م').charAt(0);
                    
                    // تحميل شكاوي العميل
                    loadClientTickets(currentClient.email);
                }
            } catch (error) {
                console.error('Error loading user:', error);
            }
        }

        // تحميل إعدادات الشركة
        async function loadCompanySettings() {
            try {
                const doc = await db.collection('settings').doc('company').get();
                if (doc.exists) {
                    const settings = doc.data();
                    document.getElementById('companyName').textContent = settings.name || 'KeyaTech';
                    
                    const companyInfo = document.getElementById('companyInfo');
                    const logoContainer = companyInfo.querySelector('.company-logo');
                    
                    if (settings.logoUrl) {
                        logoContainer.innerHTML = `<img src="${settings.logoUrl}" alt="شعار الشركة">`;
                    }
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        // تحميل شكاوي العميل
        async function loadClientTickets(clientEmail) {
            try {
                const snapshot = await db.collection('tickets')
                    .where('clientEmail', '==', clientEmail)
                    .orderBy('createdAt', 'desc')
                    .get();

                const tickets = [];
                let openCount = 0;
                let closedCount = 0;

                snapshot.forEach(doc => {
                    const ticket = doc.data();
                    tickets.push({ id: doc.id, ...ticket });
                    
                    if (ticket.status === 'closed') {
                        closedCount++;
                    } else {
                        openCount++;
                    }
                });

                // تحديث الإحصائيات
                document.getElementById('totalTickets').textContent = tickets.length;
                document.getElementById('openTickets').textContent = openCount;
                document.getElementById('closedTickets').textContent = closedCount;
                document.getElementById('ticketsCount').textContent = tickets.length;

                if (tickets.length > 0) {
                    const lastTicket = tickets[0];
                    document.getElementById('lastTicket').textContent = 
                        formatDate(lastTicket.createdAt);
                }

                // عرض آخر 5 شكاوي
                displayRecentTickets(tickets.slice(0, 5));

            } catch (error) {
                console.error('Error loading tickets:', error);
            }
        }

        // عرض آخر الشكاوي
        function displayRecentTickets(tickets) {
            const container = document.getElementById('recentTickets');
            
            if (tickets.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-ticket-alt"></i>
                        <p>لا توجد شكاوي حتى الآن</p>
                        <a href="client-new-ticket.html" class="btn btn-small" style="margin-top: 15px;">
                            <i class="fas fa-plus"></i>
                            أضف شكوى جديدة
                        </a>
                    </div>
                `;
                return;
            }

            let html = '';
            tickets.forEach(ticket => {
                html += `
                    <div class="ticket-item">
                        <div class="ticket-info">
                            <div class="ticket-number">${ticket.ticketNumber}</div>
                            <div class="ticket-subject">${ticket.problemTitle}</div>
                        </div>
                        <span class="ticket-status status-${ticket.status === 'open' ? 'open' : (ticket.status === 'closed' ? 'closed' : 'progress')}">
                            ${getStatusText(ticket.status)}
                        </span>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // دوال مساعدة
        function getStatusText(status) {
            const statuses = {
                'open': 'مفتوحة',
                'in-progress': 'قيد المعالجة',
                'closed': 'مغلقة'
            };
            return statuses[status] || status;
        }

        function formatDate(timestamp) {
            if (!timestamp) return '-';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('ar-EG');
        }

        // تسجيل الخروج
        async function logout() {
            await auth.signOut();
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
