<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكاويي - KeyaTech</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* نفس التصميم السابق مع إضافة */
        
        .ticket-details-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .ticket-details-modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1f35;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
        }

        .modal-header h2 {
            color: #fff;
        }

        .modal-close {
            background: none;
            border: none;
            color: #8f9bb3;
            font-size: 24px;
            cursor: pointer;
        }

        .track-system {
            background: rgba(10, 15, 30, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }

        .track-stage {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
        }

        .track-stage.completed {
            background: rgba(76, 175, 80, 0.1);
            border-right: 3px solid #4caf50;
        }

        .track-stage.active {
            background: rgba(255, 152, 0, 0.1);
            border-right: 3px solid #ff9800;
        }

        .stage-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-icon.completed {
            background: #4caf50;
        }

        .stage-icon.active {
            background: #ff9800;
        }

        .stage-icon.pending {
            background: #9e9e9e;
        }

        .stage-info {
            flex: 1;
        }

        .stage-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .stage-date {
            font-size: 12px;
            color: #8f9bb3;
        }

        .stage-comment {
            font-size: 13px;
            color: #a0a0ff;
            margin-top: 5px;
        }

        .filter-section {
            background: rgba(10, 15, 30, 0.7);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-width: 150px;
        }

        .search-input {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
        }
    </style>
</head>
<body>
    <div class="tech-background">
        <div class="grid-overlay"></div>
    </div>

    <div class="app-container">
        <!-- القائمة الجانبية (نفس السابق) -->
        <aside class="sidebar">
            <!-- ... نفس المحتوى ... -->
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>شكاويي</h1>
                </div>
                <div class="company-info" id="companyInfo">
                    <div class="company-logo">
                        <i class="fas fa-building"></i>
                    </div>
                    <span class="company-name" id="companyName">KeyaTech</span>
                </div>
            </header>

            <!-- فلتر البحث -->
            <div class="filter-section">
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="🔍 بحث في الشكاوي..." onkeyup="filterTickets()">
                
                <select class="filter-select" id="statusFilter" onchange="filterTickets()">
                    <option value="all">كل الحالات</option>
                    <option value="open">مفتوحة</option>
                    <option value="in-progress">قيد المعالجة</option>
                    <option value="closed">مغلقة</option>
                </select>
                
                <select class="filter-select" id="sortFilter" onchange="sortTickets()">
                    <option value="newest">الأحدث أولاً</option>
                    <option value="oldest">الأقدم أولاً</option>
                </select>
            </div>

            <!-- قائمة الشكاوي -->
            <div class="tickets-list">
                <div class="section-header">
                    <h2>جميع الشكاوي</h2>
                    <span id="ticketsCount">0</span>
                </div>

                <div id="allTickets">
                    <!-- سيتم إضافة الشكاوي ديناميكياً -->
                </div>
            </div>
        </main>
    </div>

    <!-- نافذة تفاصيل التذكرة -->
    <div class="ticket-details-modal" id="ticketModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTicketNumber">تفاصيل الشكوى</h2>
                <button class="modal-close" onclick="closeTicketModal()">&times;</button>
            </div>
            
            <div id="ticketDetails">
                <!-- سيتم تعبئة التفاصيل -->
            </div>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allTickets = [];
        let filteredTickets = [];

        // التحقق من تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadUserData(user.uid);
                loadCompanySettings();
            } else {
                window.location.href = '/login.html';
            }
        });

        // تحميل بيانات المستخدم
        async function loadUserData(userId) {
            const doc = await db.collection('users').doc(userId).get();
            if (doc.exists) {
                const userData = doc.data();
                loadClientTickets(userData.email);
            }
        }

        // تحميل إعدادات الشركة
        async function loadCompanySettings() {
            const doc = await db.collection('settings').doc('company').get();
            if (doc.exists) {
                const settings = doc.data();
                document.getElementById('companyName').textContent = settings.name || 'KeyaTech';
                
                const companyInfo = document.getElementById('companyInfo');
                const logoContainer = companyInfo.querySelector('.company-logo');
                
                if (settings.logoUrl) {
                    logoContainer.innerHTML = `<img src="${settings.logoUrl}" alt="شعار الشركة">`;
                }
            }
        }

        // تحميل شكاوي العميل
        async function loadClientTickets(clientEmail) {
            try {
                const snapshot = await db.collection('tickets')
                    .where('clientEmail', '==', clientEmail)
                    .orderBy('createdAt', 'desc')
                    .get();

                allTickets = [];
                snapshot.forEach(doc => {
                    allTickets.push({ id: doc.id, ...doc.data() });
                });

                filteredTickets = [...allTickets];
                displayTickets(filteredTickets);
                document.getElementById('ticketsCount').textContent = allTickets.length;

            } catch (error) {
                console.error('Error loading tickets:', error);
            }
        }

        // عرض التذاكر
        function displayTickets(tickets) {
            const container = document.getElementById('allTickets');
            
            if (tickets.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-ticket-alt"></i>
                        <p>لا توجد شكاوي مطابقة للبحث</p>
                    </div>
                `;
                return;
            }

            let html = '';
            tickets.forEach(ticket => {
                const date = ticket.createdAt ? 
                    ticket.createdAt.toDate().toLocaleDateString('ar-EG') : '-';
                
                html += `
                    <div class="ticket-item" onclick="showTicketDetails('${ticket.id}')" style="cursor: pointer;">
                        <div class="ticket-info">
                            <div class="ticket-number">${ticket.ticketNumber}</div>
                            <div class="ticket-subject">${ticket.problemTitle}</div>
                            <div style="font-size: 12px; color: #8f9bb3; margin-top: 5px;">
                                <i class="fas fa-calendar"></i> ${date}
                            </div>
                        </div>
                        <span class="ticket-status status-${ticket.status === 'open' ? 'open' : (ticket.status === 'closed' ? 'closed' : 'progress')}">
                            ${getStatusText(ticket.status)}
                        </span>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // فلترة التذاكر
        function filterTickets() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            filteredTickets = allTickets.filter(ticket => {
                // فلترة حسب الحالة
                if (statusFilter !== 'all' && ticket.status !== statusFilter) {
                    return false;
                }
                
                // فلترة حسب البحث
                if (searchTerm) {
                    return ticket.ticketNumber.toLowerCase().includes(searchTerm) ||
                           ticket.problemTitle.toLowerCase().includes(searchTerm) ||
                           ticket.problemDescription.toLowerCase().includes(searchTerm);
                }
                
                return true;
            });

            displayTickets(filteredTickets);
        }

        // ترتيب التذاكر
        function sortTickets() {
            const sortBy = document.getElementById('sortFilter').value;
            
            filteredTickets.sort((a, b) => {
                const dateA = a.createdAt ? a.createdAt.toDate() : new Date(0);
                const dateB = b.createdAt ? b.createdAt.toDate() : new Date(0);
                
                return sortBy === 'newest' ? dateB - dateA : dateA - dateB;
            });

            displayTickets(filteredTickets);
        }

        // عرض تفاصيل التذكرة
        async function showTicketDetails(ticketId) {
            try {
                const doc = await db.collection('tickets').doc(ticketId).get();
                if (!doc.exists) return;

                const ticket = doc.data();
                
                // تحميل مسار التتبع
                const stagesSnapshot = await db.collection('ticketStatusLog')
                    .where('ticketId', '==', ticketId)
                    .orderBy('order', 'asc')
                    .get();

                let stagesHtml = '';
                stagesSnapshot.forEach(doc => {
                    const stage = doc.data();
                    stagesHtml += `
                        <div class="track-stage ${stage.status}">
                            <div class="stage-icon ${stage.status}">
                                <i class="fas ${stage.status === 'completed' ? 'fa-check' : (stage.status === 'active' ? 'fa-spinner fa-spin' : 'fa-clock')}"></i>
                            </div>
                            <div class="stage-info">
                                <div class="stage-name">${stage.stageName}</div>
                                <div class="stage-date">${formatDateTime(stage.timestamp)}</div>
                                ${stage.comment ? `<div class="stage-comment">${stage.comment}</div>` : ''}
                            </div>
                        </div>
                    `;
                });

                const detailsHtml = `
                    <div style="margin-bottom: 20px;">
                        <p><strong>رقم البلاغ:</strong> ${ticket.ticketNumber}</p>
                        <p><strong>العنوان:</strong> ${ticket.problemTitle}</p>
                        <p><strong>الوصف:</strong> ${ticket.problemDescription}</p>
                        <p><strong>تاريخ الإنشاء:</strong> ${formatDateTime(ticket.createdAt)}</p>
                        <p><strong>الحالة:</strong> <span class="ticket-status status-${ticket.status}">${getStatusText(ticket.status)}</span></p>
                    </div>
                    
                    <h3 style="margin: 20px 0 10px;">مسار التتبع</h3>
                    <div class="track-system">
                        ${stagesHtml || '<p>لا يوجد مسار تتبع بعد</p>'}
                    </div>
                `;

                document.getElementById('modalTicketNumber').textContent = 
                    `تفاصيل البلاغ: ${ticket.ticketNumber}`;
                document.getElementById('ticketDetails').innerHTML = detailsHtml;
                
                document.getElementById('ticketModal').classList.add('show');

            } catch (error) {
                console.error('Error loading ticket details:', error);
            }
        }

        // إغلاق النافذة
        function closeTicketModal() {
            document.getElementById('ticketModal').classList.remove('show');
        }

        // دوال مساعدة
        function getStatusText(status) {
            const statuses = {
                'open': 'مفتوحة',
                'in-progress': 'قيد المعالجة',
                'closed': 'مغلقة'
            };
            return statuses[status] || status;
        }

        function formatDateTime(timestamp) {
            if (!timestamp) return '-';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('ar-EG') + ' ' + 
                   date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        }

        // تسجيل الخروج
        async function logout() {
            await auth.signOut();
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
