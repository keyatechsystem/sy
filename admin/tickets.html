<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة التذاكر - KeyaTech</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        /* نفس التصميم الأساسي من الملفات السابقة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0f1e;
            color: #fff;
        }

        .tech-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1f35 0%, #0a0f1e 100%);
        }

        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(102, 126, 234, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 126, 234, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 15s linear infinite;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(102, 126, 234, 0.2);
            padding: 25px;
            position: fixed;
            height: 100vh;
            right: 0;
            top: 0;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .logo span {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: #8f9bb3;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(102, 126, 234, 0.1);
            color: #fff;
        }

        .nav-link i {
            width: 24px;
            color: #667eea;
        }

        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 25px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .header-title h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* قسم التذاكر */
        .tickets-section {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 20px;
            padding: 25px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            font-size: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .filter-section {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-width: 250px;
        }

        .filter-select {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-width: 150px;
        }

        .tickets-table {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: right;
            padding: 15px;
            color: #8f9bb3;
            font-weight: 500;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }

        .ticket-id {
            color: #667eea;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.open {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-badge.progress {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }

        .status-badge.closed {
            background: rgba(158, 158, 158, 0.2);
            color: #9e9e9e;
        }

        .priority-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .priority-badge.high {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .priority-badge.medium {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }

        .priority-badge.low {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: scale(1.2);
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            margin-top: 30px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
        }

        .user-role {
            font-size: 12px;
            color: #667eea;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #f5576c;
            font-size: 20px;
            cursor: pointer;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .page-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn:hover,
        .page-btn.active {
            background: #667eea;
            border-color: #667eea;
        }

        @media (max-width: 768px) {
            .filter-section {
                flex-direction: column;
            }
            
            .search-box, .filter-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="tech-background">
        <div class="grid-overlay"></div>
    </div>

    <div class="app-container">
        <!-- القائمة الجانبية -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">K</div>
                <span>KeyaTech</span>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="admin-dashboard.html" class="nav-link">
                        <i class="fas fa-chart-pie"></i>
                        لوحة التحكم
                    </a>
                </li>
                <li class="nav-item">
                    <a href="users.html" class="nav-link">
                        <i class="fas fa-users-cog"></i>
                        المستخدمين
                    </a>
                </li>
                <li class="nav-item">
                    <a href="tickets.html" class="nav-link active">
                        <i class="fas fa-tickets"></i>
                        التذاكر
                    </a>
                </li>
                <li class="nav-item">
                    <a href="reports.html" class="nav-link">
                        <i class="fas fa-chart-line"></i>
                        التقارير
                    </a>
                </li>
                <li class="nav-item">
                    <a href="online-users.html" class="nav-link">
                        <i class="fas fa-users"></i>
                        المتصلين
                    </a>
                </li>
                <li class="nav-item">
                    <a href="settings.html" class="nav-link">
                        <i class="fas fa-cog"></i>
                        الإعدادات
                    </a>
                </li>
            </ul>
            
            <div class="current-user">
                <div class="user-avatar" id="userAvatar">م</div>
                <div class="user-details">
                    <div class="user-name" id="userName">جاري التحميل...</div>
                    <div class="user-role">مدير النظام</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>إدارة التذاكر</h1>
                </div>
                <span id="currentDateTime"></span>
            </header>

            <div class="tickets-section">
                <div class="section-header">
                    <h2>جميع التذاكر</h2>
                    <a href="/client/client-new-ticket.html" class="btn btn-primary">
                        <i class="fas fa-plus"></i>
                        تذكرة جديدة
                    </a>
                </div>

                <div class="filter-section">
                    <input type="text" class="search-box" id="searchInput" 
                           placeholder="🔍 بحث برقم التذكرة أو اسم العميل..." onkeyup="filterTickets()">
                    
                    <select class="filter-select" id="statusFilter" onchange="filterTickets()">
                        <option value="all">كل الحالات</option>
                        <option value="open">مفتوحة</option>
                        <option value="in-progress">قيد المعالجة</option>
                        <option value="closed">مغلقة</option>
                    </select>
                    
                    <select class="filter-select" id="priorityFilter" onchange="filterTickets()">
                        <option value="all">كل الأولويات</option>
                        <option value="high">عالية</option>
                        <option value="medium">متوسطة</option>
                        <option value="low">منخفضة</option>
                    </select>
                    
                    <select class="filter-select" id="engineerFilter" onchange="filterTickets()">
                        <option value="all">كل المهندسين</option>
                    </select>
                </div>

                <div class="tickets-table">
                    <table>
                        <thead>
                            <tr>
                                <th>رقم التذكرة</th>
                                <th>العميل</th>
                                <th>الموضوع</th>
                                <th>الحالة</th>
                                <th>الأولوية</th>
                                <th>المهندس</th>
                                <th>تاريخ الإنشاء</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="ticketsTableBody">
                            <tr>
                                <td colspan="8" style="text-align: center;">جاري تحميل البيانات...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination">
                    <!-- سيتم إضافة أزرار التصفح -->
                </div>
            </div>
        </main>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let allTickets = [];
        let engineers = [];
        let currentPage = 1;
        const ticketsPerPage = 10;

        // التحقق من تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadUserData(user.uid);
                loadEngineers();
                loadTickets();
            } else {
                window.location.href = '/login.html';
            }
        });

        // تحميل بيانات المستخدم
        async function loadUserData(userId) {
            const doc = await db.collection('users').doc(userId).get();
            if (doc.exists) {
                const userData = doc.data();
                document.getElementById('userName').textContent = userData.displayName || userData.name;
                document.getElementById('userAvatar').textContent = (userData.name || 'م').charAt(0);
            }
        }

        // تحميل قائمة المهندسين
        async function loadEngineers() {
            try {
                const snapshot = await db.collection('users')
                    .where('role', '==', 'engineer')
                    .get();

                const select = document.getElementById('engineerFilter');
                engineers = [];

                snapshot.forEach(doc => {
                    const engineer = doc.data();
                    engineers.push({ id: doc.id, name: engineer.displayName || engineer.name });
                    
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = engineer.displayName || engineer.name;
                    select.appendChild(option);
                });

            } catch (error) {
                console.error('Error loading engineers:', error);
            }
        }

        // تحميل التذاكر
        async function loadTickets() {
            try {
                const snapshot = await db.collection('tickets')
                    .orderBy('createdAt', 'desc')
                    .get();

                allTickets = [];
                snapshot.forEach(doc => {
                    allTickets.push({ id: doc.id, ...doc.data() });
                });

                filterTickets();

            } catch (error) {
                console.error('Error loading tickets:', error);
            }
        }

        // فلترة التذاكر
        function filterTickets() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const priorityFilter = document.getElementById('priorityFilter').value;
            const engineerFilter = document.getElementById('engineerFilter').value;

            let filtered = allTickets.filter(ticket => {
                // فلترة حسب الحالة
                if (statusFilter !== 'all' && ticket.status !== statusFilter) {
                    return false;
                }

                // فلترة حسب الأولوية
                if (priorityFilter !== 'all' && ticket.priority !== priorityFilter) {
                    return false;
                }

                // فلترة حسب المهندس
                if (engineerFilter !== 'all' && ticket.assignedTo !== engineerFilter) {
                    return false;
                }

                // فلترة حسب البحث
                if (searchTerm) {
                    const ticketNumber = (ticket.ticketNumber || '').toLowerCase();
                    const clientName = (ticket.clientName || '').toLowerCase();
                    const subject = (ticket.problemTitle || '').toLowerCase();
                    
                    return ticketNumber.includes(searchTerm) || 
                           clientName.includes(searchTerm) || 
                           subject.includes(searchTerm);
                }

                return true;
            });

            displayTickets(filtered);
        }

        // عرض التذاكر
        function displayTickets(tickets) {
            const tbody = document.getElementById('ticketsTableBody');
            
            if (tickets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">لا توجد تذاكر</td></tr>';
                return;
            }

            // حساب الصفحة الحالية
            const start = (currentPage - 1) * ticketsPerPage;
            const end = start + ticketsPerPage;
            const paginatedTickets = tickets.slice(start, end);

            let html = '';
            paginatedTickets.forEach(ticket => {
                const date = ticket.createdAt ? 
                    ticket.createdAt.toDate().toLocaleDateString('ar-EG') : '-';
                
                const engineerName = getEngineerName(ticket.assignedTo);

                html += `
                    <tr>
                        <td class="ticket-id">${ticket.ticketNumber || '---'}</td>
                        <td>${ticket.clientName || '---'}</td>
                        <td>${ticket.problemTitle || '---'}</td>
                        <td><span class="status-badge ${ticket.status || 'open'}">${getStatusText(ticket.status)}</span></td>
                        <td><span class="priority-badge ${ticket.priority || 'medium'}">${getPriorityText(ticket.priority)}</span></td>
                        <td>${engineerName}</td>
                        <td>${date}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn" onclick="viewTicket('${ticket.id}')" title="عرض">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="action-btn" onclick="editTicket('${ticket.id}')" title="تعديل">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="action-btn" onclick="assignTicket('${ticket.id}')" title="تعيين">
                                    <i class="fas fa-user-plus"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            updatePagination(tickets.length);
        }

        // تحديث أزرار التصفح
        function updatePagination(totalItems) {
            const totalPages = Math.ceil(totalItems / ticketsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" 
                               onclick="goToPage(${i})">${i}</button>`;
            }

            pagination.innerHTML = html;
        }

        // الذهاب إلى صفحة معينة
        function goToPage(page) {
            currentPage = page;
            filterTickets();
        }

        // عرض تفاصيل التذكرة
        function viewTicket(ticketId) {
            window.location.href = `ticket-details.html?id=${ticketId}`;
        }

        // تعديل التذكرة
        function editTicket(ticketId) {
            window.location.href = `edit-ticket.html?id=${ticketId}`;
        }

        // تعيين مهندس للتذكرة
        function assignTicket(ticketId) {
            // فتح نافذة اختيار المهندس
            const engineerNames = engineers.map(e => e.name).join('\n');
            const selected = prompt('اختر المهندس من القائمة:\n' + engineerNames);
            
            if (selected) {
                const engineer = engineers.find(e => e.name === selected);
                if (engineer) {
                    updateTicketAssignment(ticketId, engineer.id, engineer.name);
                }
            }
        }

        // تحديث تعيين التذكرة
        async function updateTicketAssignment(ticketId, engineerId, engineerName) {
            try {
                await db.collection('tickets').doc(ticketId).update({
                    assignedTo: engineerId,
                    assignedToName: engineerName,
                    assignedBy: currentUser.uid,
                    assignedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert('تم تعيين المهندس بنجاح');
                loadTickets();

            } catch (error) {
                alert('خطأ في تعيين المهندس: ' + error.message);
            }
        }

        // دوال مساعدة
        function getStatusText(status) {
            const statuses = {
                'open': 'مفتوحة',
                'in-progress': 'قيد المعالجة',
                'closed': 'مغلقة'
            };
            return statuses[status] || status;
        }

        function getPriorityText(priority) {
            const priorities = {
                'low': 'منخفضة',
                'medium': 'متوسطة',
                'high': 'عالية',
                'urgent': 'عاجلة'
            };
            return priorities[priority] || priority;
        }

        function getEngineerName(engineerId) {
            if (!engineerId) return 'غير معين';
            const engineer = engineers.find(e => e.id === engineerId);
            return engineer ? engineer.name : 'غير معين';
        }

        // تحديث التاريخ والوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = 
                now.toLocaleDateString('ar-EG', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
        }

        // تسجيل الخروج
        async function logout() {
            await auth.signOut();
            window.location.href = '/login.html';
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>
</html>
