<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصل استلام - KeyaTech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/tech-design.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* تصميم خاص للوصل */
        .receipt-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .receipt-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            color: #333;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            animation: receiptGlow 3s ease-in-out infinite;
        }
        
        @keyframes receiptGlow {
            0%, 100% { box-shadow: 0 30px 60px rgba(102,126,234,0.3); }
            50% { box-shadow: 0 30px 80px rgba(102,126,234,0.6); }
        }
        
        .receipt-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #ff6b6b, #667eea);
            background-size: 300% 100%;
            animation: gradientMove 5s linear infinite;
        }
        
        .receipt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #667eea;
            position: relative;
        }
        
        .receipt-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 35px;
            font-weight: bold;
            animation: float 3s ease-in-out infinite;
        }
        
        .logo-text h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .logo-text p {
            color: #666;
            font-size: 14px;
        }
        
        .receipt-qr {
            text-align: center;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .receipt-qr canvas {
            width: 120px;
            height: 120px;
            border: 3px solid #667eea;
            padding: 5px;
            border-radius: 15px;
            background: white;
        }
        
        .receipt-title {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .receipt-title h2 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(102,126,234,0.2);
        }
        
        .receipt-title .ticket-number {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        
        .receipt-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .receipt-info::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.1), transparent);
            animation: rotate 10s linear infinite;
        }
        
        .info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .info-row:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.2);
        }
        
        .info-label {
            font-weight: 700;
            color: #667eea;
            min-width: 100px;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
        }
        
        .description-box {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border-right: 4px solid #667eea;
        }
        
        .receipt-footer {
            text-align: center;
            padding-top: 25px;
            border-top: 2px dashed #667eea;
            margin-top: 20px;
        }
        
        .receipt-footer p {
            color: #666;
            margin-bottom: 10px;
        }
        
        .signature-line {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            padding: 20px;
        }
        
        .signature {
            text-align: center;
        }
        
        .signature .line {
            width: 200px;
            height: 1px;
            background: #333;
            margin: 10px 0;
        }
        
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
            opacity: 0.1;
            font-size: 60px;
            font-weight: bold;
            color: #667eea;
            transform: rotate(-15deg);
            pointer-events: none;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn-print, .btn-download {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-print {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-download {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
        }
        
        .btn-print:hover, .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        
        @media print {
            .actions, .no-print {
                display: none !important;
            }
            
            .receipt-card {
                box-shadow: none;
                padding: 20px;
            }
            
            .receipt-card::before {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .receipt-info {
                grid-template-columns: 1fr;
            }
            
            .receipt-header {
                flex-direction: column;
                gap: 20px;
            }
            
            .signature-line {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="tech-bg"></div>
    
    <div class="receipt-container">
        <div class="receipt-card" id="receiptContent">
            <div class="watermark">KeyaTech</div>
            
            <div class="receipt-header">
                <div class="receipt-logo">
                    <div class="logo-icon" id="logoIcon">K</div>
                    <div class="logo-text">
                        <h1 id="companyName">KeyaTech</h1>
                        <p>نظام إدارة الدعم الفني المتكامل</p>
                    </div>
                </div>
                <div class="receipt-qr" id="qrContainer"></div>
            </div>
            
            <div class="receipt-title">
                <h2>وصل استلام شكوى</h2>
                <div class="ticket-number" id="ticketNumber">TCK-2024-0001</div>
            </div>
            
            <div class="receipt-info" id="receiptInfo"></div>
            
            <div class="description-box" id="descriptionBox"></div>
            
            <div class="receipt-footer">
                <p>تم استلام شكوتكم بنجاح، وسيتم التواصل معكم في أقرب وقت ممكن</p>
                <p>شكراً لثقتكم في <span id="companyNameFooter">KeyaTech</span></p>
                
                <div class="signature-line">
                    <div class="signature">
                        <div class="line"></div>
                        <p>توقيع المستلم</p>
                    </div>
                    <div class="signature">
                        <div class="line"></div>
                        <p>ختم الشركة</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="actions no-print">
            <button class="btn-print" onclick="window.print()">
                <i class="fas fa-print"></i>
                طباعة
            </button>
            <button class="btn-download" onclick="downloadReceipt()">
                <i class="fas fa-download"></i>
                تحميل
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const ticketId = urlParams.get('id');

        async function loadTicket() {
            if (!ticketId) {
                alert('رقم التذكرة غير موجود');
                return;
            }

            try {
                const ticketDoc = await db.collection('tickets').doc(ticketId).get();
                if (!ticketDoc.exists) {
                    alert('التذكرة غير موجودة');
                    return;
                }

                const ticket = ticketDoc.data();
                
                // تحميل إعدادات الشركة
                const settingsDoc = await db.collection('settings').doc('company').get();
                const company = settingsDoc.exists ? settingsDoc.data() : { name: 'KeyaTech' };

                // تحديث أسماء الشركة
                document.getElementById('companyName').textContent = company.name || 'KeyaTech';
                document.getElementById('companyNameFooter').textContent = company.name || 'KeyaTech';
                
                // تحديث اللوجو
                if (company.logoUrl) {
                    document.getElementById('logoIcon').innerHTML = `<img src="${company.logoUrl}" style="width:100%;height:100%;object-fit:cover;">`;
                }

                // تعبئة المعلومات
                document.getElementById('ticketNumber').textContent = ticket.ticketNumber || '---';
                
                const date = ticket.createdAt ? ticket.createdAt.toDate().toLocaleDateString('ar-EG') : '-';
                const time = ticket.createdAt ? ticket.createdAt.toDate().toLocaleTimeString('ar-EG') : '-';
                
                document.getElementById('receiptInfo').innerHTML = `
                    <div class="info-row">
                        <span class="info-label">اسم العميل:</span>
                        <span class="info-value">${ticket.clientName || '---'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">رقم الهاتف:</span>
                        <span class="info-value">${ticket.clientPhone || '---'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">البريد الإلكتروني:</span>
                        <span class="info-value">${ticket.clientEmail || '---'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">نوع المشكلة:</span>
                        <span class="info-value">${ticket.problemType || '---'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">تاريخ الاستلام:</span>
                        <span class="info-value">${date}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">وقت الاستلام:</span>
                        <span class="info-value">${time}</span>
                    </div>
                `;

                document.getElementById('descriptionBox').innerHTML = `
                    <h4 style="color: #667eea; margin-bottom: 10px;">${ticket.problemTitle || '---'}</h4>
                    <p>${ticket.problemDescription || '---'}</p>
                `;

                // إنشاء QR code
                QRCode.toCanvas(document.createElement('canvas'), ticket.ticketNumber, { width: 120 }, (err, canvas) => {
                    if (err) console.error(err);
                    document.getElementById('qrContainer').innerHTML = '';
                    document.getElementById('qrContainer').appendChild(canvas);
                });

            } catch (error) {
                console.error('Error loading ticket:', error);
                alert('حدث خطأ في تحميل البيانات');
            }
        }

        async function downloadReceipt() {
            const receipt = document.getElementById('receiptContent');
            
            try {
                const canvas = await html2canvas(receipt, {
                    scale: 2,
                    backgroundColor: '#ffffff'
                });
                
                const link = document.createElement('a');
                link.download = `receipt-${ticketId}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (error) {
                console.error('Error downloading receipt:', error);
                alert('حدث خطأ في تحميل الوصل');
            }
        }

        window.onload = loadTicket;
    </script>
</body>
</html>
