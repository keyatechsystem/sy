<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تذاكري - المهندس | KeyaTech</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0f1e;
            color: #fff;
        }

        .tech-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #1a1f35 0%, #0a0f1e 100%);
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(102, 126, 234, 0.2);
            padding: 25px;
            position: fixed;
            height: 100vh;
            right: 0;
            top: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
        }

        .logo span {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: #8f9bb3;
            text-decoration: none;
            border-radius: 12px;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(102, 126, 234, 0.1);
            color: #fff;
        }

        .nav-link i {
            width: 24px;
            color: #667eea;
        }

        .badge {
            background: #f5576c;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-right: auto;
        }

        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 25px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        .header-title h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #fff 0%, #a0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .current-user {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            margin-top: 30px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
        }

        .user-role {
            font-size: 12px;
            color: #667eea;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #f5576c;
            font-size: 20px;
            cursor: pointer;
        }

        /* Kanban Board */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 30px;
        }

        .kanban-column {
            background: rgba(10, 15, 30, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 20px;
            padding: 20px;
            min-height: 500px;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid;
        }

        .column-header.pending {
            border-color: #ff9800;
        }

        .column-header.progress {
            border-color: #2196f3;
        }

        .column-header.completed {
            border-color: #4caf50;
        }

        .column-title {
            font-size: 18px;
            font-weight: 600;
        }

        .column-count {
            background: rgba(255,255,255,0.1);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .ticket-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ticket-card:hover {
            transform: translateY(-3px);
            border-color: #667eea;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .ticket-id {
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
        }

        .ticket-priority {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        .priority-high {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .priority-medium {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }

        .priority-low {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .ticket-title {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .ticket-client {
            font-size: 12px;
            color: #8f9bb3;
            margin-bottom: 10px;
        }

        .ticket-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #8f9bb3;
        }

        .ticket-time i {
            margin-left: 3px;
        }

        /* نافذة التذكرة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1f35;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(102,126,234,0.3);
        }

        .modal-header h2 {
            color: #fff;
        }

        .modal-close {
            background: none;
            border: none;
            color: #8f9bb3;
            font-size: 24px;
            cursor: pointer;
        }

        .ticket-detail-row {
            display: flex;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .detail-label {
            width: 120px;
            color: #8f9bb3;
        }

        .detail-value {
            flex: 1;
            color: #fff;
        }

        .status-select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 10px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 20px 0;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="tech-background"></div>

    <div class="app-container">
        <!-- القائمة الجانبية -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">K</div>
                <span>KeyaTech</span>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="engineer-tickets.html" class="nav-link active">
                        <i class="fas fa-tasks"></i>
                        تذاكري
                        <span class="badge" id="totalBadge">0</span>
                    </a>
                </li>
            </ul>
            
            <div class="current-user">
                <div class="user-avatar" id="userAvatar">م</div>
                <div class="user-details">
                    <div class="user-name" id="userName">جاري التحميل...</div>
                    <div class="user-role">مهندس</div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>مرحباً أيها المهندس 👨‍💻</h1>
                </div>
                <span id="currentDateTime"></span>
            </header>

            <!-- لوحة كانبان -->
            <div class="kanban-board">
                <!-- عمود المعلقة -->
                <div class="kanban-column">
                    <div class="column-header pending">
                        <span class="column-title">⏳ معلقة</span>
                        <span class="column-count" id="pendingCount">0</span>
                    </div>
                    <div id="pendingTickets">
                        <!-- تذاكر معلقة -->
                    </div>
                </div>

                <!-- عمود قيد التنفيذ -->
                <div class="kanban-column">
                    <div class="column-header progress">
                        <span class="column-title">⚙️ قيد التنفيذ</span>
                        <span class="column-count" id="progressCount">0</span>
                    </div>
                    <div id="progressTickets">
                        <!-- تذاكر قيد التنفيذ -->
                    </div>
                </div>

                <!-- عمود المنجزة -->
                <div class="kanban-column">
                    <div class="column-header completed">
                        <span class="column-title">✅ منجزة</span>
                        <span class="column-count" id="completedCount">0</span>
                    </div>
                    <div id="completedTickets">
                        <!-- تذاكر منجزة -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- نافذة تفاصيل التذكرة -->
    <div class="modal" id="ticketModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTicketNumber">تفاصيل التذكرة</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            
            <div id="ticketDetails">
                <!-- يتم تعبئتها ديناميكياً -->
            </div>
            
            <select class="status-select" id="ticketStatus" onchange="updateTicketStatus()">
                <option value="pending">معلقة</option>
                <option value="in-progress">قيد التنفيذ</option>
                <option value="closed">مغلقة</option>
            </select>
            
            <button class="btn btn-primary" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentTicketId = null;
        let tickets = [];

        // التحقق من تسجيل الدخول
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                loadUserData(user.uid);
                loadEngineerTickets(user.uid);
            } else {
                window.location.href = '/login.html';
            }
        });

        // تحميل بيانات المستخدم
        async function loadUserData(userId) {
            const doc = await db.collection('users').doc(userId).get();
            if (doc.exists) {
                const userData = doc.data();
                document.getElementById('userName').textContent = userData.displayName || userData.name;
                document.getElementById('userAvatar').textContent = (userData.name || 'م').charAt(0);
            }
        }

        // تحميل تذاكر المهندس
        async function loadEngineerTickets(engineerId) {
            try {
                const snapshot = await db.collection('tickets')
                    .where('assignedTo', '==', engineerId)
                    .orderBy('createdAt', 'desc')
                    .get();

                tickets = [];
                snapshot.forEach(doc => {
                    tickets.push({ id: doc.id, ...doc.data() });
                });

                displayTickets();

            } catch (error) {
                console.error('Error loading tickets:', error);
            }
        }

        // عرض التذاكر
        function displayTickets() {
            const pendingTickets = tickets.filter(t => t.status === 'pending' || t.status === 'open');
            const progressTickets = tickets.filter(t => t.status === 'in-progress');
            const completedTickets = tickets.filter(t => t.status === 'closed');

            document.getElementById('pendingCount').textContent = pendingTickets.length;
            document.getElementById('progressCount').textContent = progressTickets.length;
            document.getElementById('completedCount').textContent = completedTickets.length;
            document.getElementById('totalBadge').textContent = tickets.length;

            displayPendingTickets(pendingTickets);
            displayProgressTickets(progressTickets);
            displayCompletedTickets(completedTickets);
        }

        // عرض التذاكر المعلقة
        function displayPendingTickets(tickets) {
            const container = document.getElementById('pendingTickets');
            container.innerHTML = tickets.map(ticket => createTicketCard(ticket)).join('');
        }

        // عرض التذاكر قيد التنفيذ
        function displayProgressTickets(tickets) {
            const container = document.getElementById('progressTickets');
            container.innerHTML = tickets.map(ticket => createTicketCard(ticket)).join('');
        }

        // عرض التذاكر المنجزة
        function displayCompletedTickets(tickets) {
            const container = document.getElementById('completedTickets');
            container.innerHTML = tickets.map(ticket => createTicketCard(ticket)).join('');
        }

        // إنشاء بطاقة تذكرة
        function createTicketCard(ticket) {
            const date = ticket.createdAt ? 
                ticket.createdAt.toDate().toLocaleDateString('ar-EG') : '-';
            
            const priorityClass = ticket.priority === 'high' || ticket.priority === 'urgent' ? 'priority-high' :
                                 ticket.priority === 'medium' ? 'priority-medium' : 'priority-low';

            return `
                <div class="ticket-card" onclick="showTicketDetails('${ticket.id}')">
                    <div class="ticket-header">
                        <span class="ticket-id">${ticket.ticketNumber || '---'}</span>
                        <span class="ticket-priority ${priorityClass}">${getPriorityText(ticket.priority)}</span>
                    </div>
                    <div class="ticket-title">${ticket.problemTitle || '---'}</div>
                    <div class="ticket-client">
                        <i class="fas fa-user"></i> ${ticket.clientName || '---'}
                    </div>
                    <div class="ticket-footer">
                        <span class="ticket-time">
                            <i class="far fa-clock"></i> ${date}
                        </span>
                    </div>
                </div>
            `;
        }

        // عرض تفاصيل التذكرة
        async function showTicketDetails(ticketId) {
            currentTicketId = ticketId;
            const ticket = tickets.find(t => t.id === ticketId);
            
            if (!ticket) return;

            const date = ticket.createdAt ? 
                ticket.createdAt.toDate().toLocaleString('ar-EG') : '-';

            document.getElementById('modalTicketNumber').textContent = 
                `تذكرة رقم: ${ticket.ticketNumber}`;
            
            document.getElementById('ticketDetails').innerHTML = `
                <div class="ticket-detail-row">
                    <span class="detail-label">العميل:</span>
                    <span class="detail-value">${ticket.clientName || '---'}</span>
                </div>
                <div class="ticket-detail-row">
                    <span class="detail-label">رقم الهاتف:</span>
                    <span class="detail-value">${ticket.clientPhone || '---'}</span>
                </div>
                <div class="ticket-detail-row">
                    <span class="detail-label">البريد:</span>
                    <span class="detail-value">${ticket.clientEmail || '---'}</span>
                </div>
                <div class="ticket-detail-row">
                    <span class="detail-label">الموضوع:</span>
                    <span class="detail-value">${ticket.problemTitle || '---'}</span>
                </div>
                <div class="ticket-detail-row">
                    <span class="detail-label">الوصف:</span>
                    <span class="detail-value">${ticket.problemDescription || '---'}</span>
                </div>
                <div class="ticket-detail-row">
                    <span class="detail-label">تاريخ الإنشاء:</span>
                    <span class="detail-value">${date}</span>
                </div>
                <div class="ticket-detail-row">
                    <span class="detail-label">الأولوية:</span>
                    <span class="detail-value">${getPriorityText(ticket.priority)}</span>
                </div>
            `;

            document.getElementById('ticketStatus').value = ticket.status || 'pending';
            document.getElementById('ticketModal').classList.add('show');
        }

        // تحديث حالة التذكرة
        async function updateTicketStatus() {
            if (!currentTicketId) return;

            const newStatus = document.getElementById('ticketStatus').value;

            try {
                await db.collection('tickets').doc(currentTicketId).update({
                    status: newStatus,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // إضافة مرحلة جديدة في مسار التتبع
                await db.collection('ticketStatusLog').add({
                    ticketId: currentTicketId,
                    status: newStatus,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedBy: currentUser.uid
                });

                alert('تم تحديث حالة التذكرة بنجاح');
                closeModal();
                loadEngineerTickets(currentUser.uid);

            } catch (error) {
                alert('خطأ في تحديث الحالة: ' + error.message);
            }
        }

        // دوال مساعدة
        function getPriorityText(priority) {
            const priorities = {
                'low': 'منخفضة',
                'medium': 'متوسطة',
                'high': 'عالية',
                'urgent': 'عاجلة'
            };
            return priorities[priority] || priority;
        }

        function closeModal() {
            document.getElementById('ticketModal').classList.remove('show');
            currentTicketId = null;
        }

        // تحديث التاريخ والوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDateTime').textContent = 
                now.toLocaleDateString('ar-EG', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
        }

        // تسجيل الخروج
        async function logout() {
            await auth.signOut();
            window.location.href = '/login.html';
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>
</html>
