<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - KeyaTech</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .redirect-container {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            margin-bottom: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            overflow: hidden;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo span {
            font-size: 40px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="logo" id="logo">
            <span>K</span>
        </div>
        <h1 id="companyName">KeyaTech</h1>
        <p>جاري تحميل لوحة التحكم</p>
        <div class="spinner"></div>
        <p>سيتم توجيهك حسب صلاحياتك...</p>
    </div>

    <script>
        // تهيئة Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAFHsmuDtkflEURrCtJh7-_O7sbTxel1BI",
            authDomain: "keyatech-db.firebaseapp.com",
            projectId: "keyatech-db",
            storageBucket: "keyatech-db.firebasestorage.app",
            messagingSenderId: "447786557425",
            appId: "1:447786557425:web:0330ccb97d9481aade6e50"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // تحميل إعدادات الشركة
        async function loadCompanySettings() {
            try {
                const doc = await db.collection('settings').doc('company').get();
                if (doc.exists) {
                    const settings = doc.data();
                    document.getElementById('companyName').textContent = settings.name || 'KeyaTech';
                    
                    if (settings.logoUrl) {
                        const logoDiv = document.getElementById('logo');
                        logoDiv.innerHTML = `<img src="${settings.logoUrl}" alt="شعار الشركة">`;
                    }
                }
            } catch (error) {
                console.error('Error loading company settings:', error);
            }
        }

        auth.onAuthStateChanged((user) => {
            loadCompanySettings().then(() => {
                if (user) {
                    db.collection('users').doc(user.uid).get()
                        .then((doc) => {
                            if (doc.exists) {
                                const userData = doc.data();
                                
                                setTimeout(() => {
                                    switch(userData.role) {
                                        case 'admin':
                                            window.location.href = 'admin/admin-dashboard.html';
                                            break;
                                        case 'engineer':
                                            window.location.href = 'engineer/engineer-tickets.html';
                                            break;
                                        case 'assistant':
                                            window.location.href = 'assistant/assistant-clients.html';
                                            break;
                                        default:
                                            window.location.href = 'client/client-dashboard.html';
                                    }
                                }, 2000);
                            } else {
                                window.location.href = 'login.html';
                            }
                        })
                        .catch(() => {
                            window.location.href = 'login.html';
                        });
                } else {
                    window.location.href = 'login.html';
                }
            });
        });
    </script>
</body>
</html>
